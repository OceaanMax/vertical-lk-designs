<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Личный кабинет</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0A1B33;
    overflow: hidden;
    background: #557CEA;
  }

  /* === АНИМИРОВАННЫЙ ФОН: ЯРКИЕ ПЕРЕТЕКАЮЩИЕ ШАРЫ === */
  .bg-animated {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #557CEA 0%, #4FA5A0 50%, #62C584 100%);
    overflow: hidden;
  }

  .bg-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    will-change: transform;
  }

  /* Большие яркие шары с высокой непрозрачностью */
  .bg-blob-1 {
    width: 800px; height: 800px;
    background: radial-gradient(circle, #557CEA 0%, #3A5FD0 60%, transparent 100%);
    top: -20%; left: -15%;
    opacity: 0.85;
    animation: blob1 8s ease-in-out infinite;
  }
  .bg-blob-2 {
    width: 700px; height: 700px;
    background: radial-gradient(circle, #62C584 0%, #4AA06A 60%, transparent 100%);
    bottom: -25%; right: -15%;
    opacity: 0.85;
    animation: blob2 10s ease-in-out infinite;
  }
  .bg-blob-3 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #4FA5A0 0%, #3D8B86 60%, transparent 100%);
    top: 20%; left: 45%;
    opacity: 0.7;
    animation: blob3 7s ease-in-out infinite;
  }
  .bg-blob-4 {
    width: 550px; height: 550px;
    background: radial-gradient(circle, #3A7FD9 0%, #2E68B8 60%, transparent 100%);
    bottom: 10%; left: 5%;
    opacity: 0.75;
    animation: blob4 9s ease-in-out infinite;
  }
  .bg-blob-5 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #55B88A 0%, #43966F 60%, transparent 100%);
    top: -5%; right: 15%;
    opacity: 0.8;
    animation: blob5 6s ease-in-out infinite;
  }
  .bg-blob-6 {
    width: 450px; height: 450px;
    background: radial-gradient(circle, #6B8CF0 0%, #557CEA 60%, transparent 100%);
    top: 50%; right: -10%;
    opacity: 0.7;
    animation: blob6 11s ease-in-out infinite;
  }

  /* Широкие, заметные перемещения */
  @keyframes blob1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(250px, 150px) scale(1.2); }
    50% { transform: translate(400px, 300px) scale(0.85); }
    75% { transform: translate(150px, 200px) scale(1.1); }
  }
  @keyframes blob2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(-300px, -200px) scale(1.15); }
    50% { transform: translate(-500px, -350px) scale(0.9); }
    75% { transform: translate(-200px, -100px) scale(1.1); }
  }
  @keyframes blob3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    20% { transform: translate(-200px, 150px) scale(1.25); }
    40% { transform: translate(100px, -100px) scale(0.8); }
    60% { transform: translate(-300px, -50px) scale(1.15); }
    80% { transform: translate(50px, 200px) scale(0.9); }
  }
  @keyframes blob4 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    30% { transform: translate(350px, -150px) scale(1.2); }
    60% { transform: translate(200px, 200px) scale(0.85); }
    80% { transform: translate(500px, 50px) scale(1.1); }
  }
  @keyframes blob5 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    20% { transform: translate(-250px, 200px) scale(1.3); }
    50% { transform: translate(100px, 350px) scale(0.8); }
    70% { transform: translate(-150px, 100px) scale(1.15); }
  }
  @keyframes blob6 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    35% { transform: translate(-400px, -200px) scale(1.2); }
    65% { transform: translate(-200px, 150px) scale(0.85); }
    85% { transform: translate(-350px, -50px) scale(1.1); }
  }

  /* Мерцающее сияние поверх */
  .bg-shimmer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 30% 40%, rgba(255,255,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 70% 60%, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: shimmer 5s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes shimmer {
    0% { opacity: 0.4; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  /* === ФОРМА === */
  .login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 8px 60px rgba(10, 27, 51, 0.18), 0 0 80px rgba(85, 124, 234, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    color: #283F5B;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: -0.2px;
  }

  .subtitle {
    font-size: 15px;
    color: #9BA2BE;
    margin-bottom: 28px;
    text-align: center;
    font-weight: 400;
  }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block; font-size: 13px; font-weight: 500;
    color: #283F5B; margin-bottom: 7px;
  }

  .form-group input {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid #E9EBF8; border-radius: 12px;
    font-size: 15px; font-family: inherit; color: #0A1B33;
    background: #F6F7FB; transition: all 0.2s ease; outline: none;
  }

  .form-group input::placeholder { color: #B0B5CB; }

  .form-group input:focus {
    border-color: #557CEA; background: #fff;
    box-shadow: 0 0 0 3px rgba(85, 124, 234, 0.08);
  }

  .password-wrapper { position: relative; }
  .password-wrapper input { padding-right: 48px; }

  .toggle-password {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #B0B5CB; padding: 4px;
  }
  .toggle-password:hover { color: #557CEA; }

  .forgot-link {
    display: block; text-align: center; font-size: 13px;
    color: #557CEA; text-decoration: none; margin-bottom: 24px; font-weight: 500;
  }
  .forgot-link:hover { color: #3A7FD9; }

  .btn-login {
    width: 100%; padding: 17px 32px;
    background: #557CEA; color: #fff; border: none; border-radius: 300px;
    font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    transition: all 0.2s ease;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    height: 55px;
  }
  .btn-login:hover {
    background: #4468D0;
    box-shadow: 0 6px 20px rgba(85, 124, 234, 0.25);
  }
  .btn-login:active { transform: translateY(1px); }
  .btn-login svg { transition: transform 0.2s; }
  .btn-login:hover svg { transform: translateX(3px); }

  .agreement {
    margin-top: 24px; font-size: 12px; color: #9BA2BE;
    text-align: center; line-height: 1.6;
  }
  .agreement a { color: #557CEA; text-decoration: none; }

  .help-link {
    display: block; text-align: center; margin-top: 16px;
    font-size: 13px; color: #9BA2BE; text-decoration: none;
  }
  .help-link:hover { color: #557CEA; }

  @media (max-width: 480px) {
    .login-card { padding: 32px 24px; border-radius: 16px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- Анимированный фон с яркими перетекающими шарами -->
<div class="bg-animated">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="bg-blob bg-blob-4"></div>
  <div class="bg-blob bg-blob-5"></div>
  <div class="bg-blob bg-blob-6"></div>
</div>
<div class="bg-shimmer"></div>

<div class="login-container">
  <div class="login-card">
    <h1>Личный кабинет</h1>
    <p class="subtitle">Войдите, чтобы управлять инвестициями</p>

    <form>
      <div class="form-group">
        <label for="email">Электронная почта</label>
        <input type="email" id="email" placeholder="name@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="togglePass()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <a href="#" class="forgot-link">Забыли пароль?</a>

      <button type="submit" class="btn-login">
        Войти
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </form>

    <p class="agreement">
      Авторизовываясь, вы принимаете условия<br>
      <a href="#">Пользовательского соглашения</a>
    </p>

    <a href="#" class="help-link">Не получается войти?</a>
  </div>
</div>

<script>
function togglePass() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
